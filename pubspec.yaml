name: kai_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  path_provider: ^2.1.0
  device_info_plus: ^10.1.0  # <-- Para escanear el procesador y modelo
  system_info2: ^1.0.0      # <-- Para leer la memoria RAM real libre
  uuid: ^4.3.3              # <-- Para crear hilos de chat únicos

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1 # <-- Añade esta línea

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/logo_zynoxia.png" # <-- La ruta donde guardaste tu imagen
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo_zynoxia.png