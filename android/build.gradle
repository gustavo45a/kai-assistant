plugins {
    id "com.android.application" version "8.6.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.24" apply false
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

subprojects {
    afterEvaluate { p ->
        if (p.hasProperty("android")) {
            def ndkDir = p.android.ndkDirectory
            p.android.defaultConfig {
                externalNativeBuild {
                    cmake {
                        cppFlags "-nostdinc++", "-isystem${ndkDir}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/c++/v1", "-isystem${ndkDir}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include", "-isystem${ndkDir}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/aarch64-linux-android"
                    }
                }
            }
        }
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
